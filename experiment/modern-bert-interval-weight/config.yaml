data:
  eval_split: 0.1
  test_file: 
  train_file: 
  train_split: 0.9
experiment:
  description: Interval-Aware Weight Prediction Satisficing Loss
  name: 
  tags:
  - baseline
  - modernbert
  - satisficing loss
model:
  attention_dropout: 0.01
  dropout: 0.01
  max_length: 64
  name: answerdotai/ModernBERT-large # answerdotai/ModernBERT-large also available
testing:
  batch_size: 256
training:
  early_stopping_patience: 10
  eval_steps: 200
  learning_rate: 2.0e-05
  logging_steps: 200
  lr_scheduler_type: linear
  max_grad_norm: 0.5
  num_train_epochs: 10
  per_device_eval_batch_size: 256
  per_device_train_batch_size: 256
  save_steps: 200
  save_total_limit: 2
  seed: 42
  warmup_steps: 500
  weight_decay: 0.001
  # gradient_accumulation_steps: 8